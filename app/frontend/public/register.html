<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - PDRL</title>
  <link rel="icon" href="/images/Favicon.jpg">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <main style="flex:1" class="py-12">
    <div class="container" style="max-width:700px">
      <div class="mb-8">
        <h1 style="margin-bottom:0.5rem">Event Registration</h1>
        <p class="text-secondary">Register for an upcoming PDRL event. You must be logged in to register.</p>
      </div>

      <!-- Login Required Message -->
      <div id="login-required" class="card mb-6 hidden">
        <div class="card-body text-center py-12">
          <p class="text-lg text-secondary mb-4">You need to log in to register for events.</p>
          <button class="btn btn-primary btn-lg" onclick="Auth.login()">Login to Register</button>
        </div>
      </div>

      <!-- Registration Form -->
      <div id="registration-form" class="hidden">
        <div id="form-alerts"></div>

        <div class="card">
          <div class="card-header"><h3>Registration Details</h3></div>
          <div class="card-body">
            <form onsubmit="submitRegistration(event)">
              <div class="form-group">
                <label class="form-label">Event *</label>
                <select id="reg-event" class="form-select" required>
                  <option value="">Select an event...</option>
                </select>
              </div>

              <div class="grid grid-2">
                <div class="form-group">
                  <label class="form-label">Driver Name *</label>
                  <input type="text" id="reg-driver" class="form-input" required placeholder="Full name">
                </div>
                <div class="form-group">
                  <label class="form-label">Competition Number *</label>
                  <input type="text" id="reg-comp" class="form-input" required placeholder="e.g. 42">
                </div>
              </div>

              <div class="grid grid-2">
                <div class="form-group">
                  <label class="form-label">Phone *</label>
                  <input type="tel" id="reg-phone" class="form-input" required placeholder="(555) 123-4567">
                </div>
                <div class="form-group">
                  <label class="form-label">Class *</label>
                  <select id="reg-class" class="form-select" required>
                    <option value="">Select class...</option>
                    <option value="True Street">True Street</option>
                    <option value="Street Mod">Street Mod</option>
                    <option value="Pro Street">Pro Street</option>
                    <option value="Pro">Pro</option>
                  </select>
                </div>
              </div>

              <div class="form-group">
                <label class="form-label">Car *</label>
                <input type="text" id="reg-car" class="form-input" required placeholder="e.g. 2015 Mustang GT">
              </div>

              <div class="form-group">
                <label class="form-label">Notes (optional)</label>
                <textarea id="reg-notes" class="form-textarea" placeholder="Any additional info..."></textarea>
              </div>

              <button type="submit" class="btn btn-primary btn-lg" style="width:100%" id="submit-btn">Submit Registration</button>
            </form>
          </div>
        </div>

        <!-- My Registrations -->
        <div class="card mt-8">
          <div class="card-header"><h3>My Registrations</h3></div>
          <div class="card-body" id="my-registrations">
            <div class="loading"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="/app.js"></script>
  <script>
    async function initPage() {
      if (!Auth.isLoggedIn()) {
        document.getElementById('login-required').classList.remove('hidden');
        return;
      }

      document.getElementById('registration-form').classList.remove('hidden');

      // Load events for dropdown
      try {
        const events = await PublicAPI.fetchEvents({ status: 'upcoming', limit: 50 });
        const select = document.getElementById('reg-event');
        events.forEach(e => {
          const opt = document.createElement('option');
          opt.value = e.id;
          opt.textContent = `${e.title} — ${UI.formatDate(e.date)}`;
          select.appendChild(opt);
        });

        // Pre-select from URL param
        const preselect = UI.getQueryParam('eventId');
        if (preselect) select.value = preselect;
      } catch (e) {
        console.error('Error loading events:', e);
      }

      loadMyRegistrations();
    }

    async function submitRegistration(e) {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Submitting...';

      try {
        const data = {
          event_id: parseInt(document.getElementById('reg-event').value),
          driver_name: document.getElementById('reg-driver').value.trim(),
          competition_number: document.getElementById('reg-comp').value.trim(),
          phone: document.getElementById('reg-phone').value.trim(),
          class_name: document.getElementById('reg-class').value,
          car: document.getElementById('reg-car').value.trim(),
          notes: document.getElementById('reg-notes').value.trim() || null,
          payment_status: 'pending',
          submitted_at: new Date().toISOString()
        };

        await API.post('/api/v1/registrations', data);
        UI.showAlert(document.getElementById('form-alerts'), 'Registration submitted successfully!', 'success');

        // Reset form
        document.getElementById('reg-driver').value = '';
        document.getElementById('reg-comp').value = '';
        document.getElementById('reg-phone').value = '';
        document.getElementById('reg-car').value = '';
        document.getElementById('reg-notes').value = '';

        loadMyRegistrations();
      } catch (err) {
        UI.showAlert(document.getElementById('form-alerts'), 'Error: ' + err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Submit Registration';
      }
    }

    async function loadMyRegistrations() {
      const container = document.getElementById('my-registrations');
      try {
        const data = await API.get('/api/v1/registrations', { skip: 0, limit: 50 });
        const items = data.items || [];

        if (items.length === 0) {
          container.innerHTML = '<p class="text-secondary">No registrations yet.</p>';
          return;
        }

        const events = await PublicAPI.fetchEvents({ limit: 100 });
        const eventMap = {};
        events.forEach(e => eventMap[e.id] = e);

        container.innerHTML = `
          <div class="table-wrap">
            <table>
              <thead><tr><th>Event</th><th>Driver</th><th>Class</th><th>Car</th><th>Status</th></tr></thead>
              <tbody>
                ${items.map(r => {
                  const evt = eventMap[r.event_id];
                  return `<tr>
                    <td>${UI.escapeHtml(evt?.title || 'Event #' + r.event_id)}<br><span class="text-xs text-muted">${UI.formatDate(evt?.date)}</span></td>
                    <td class="font-semibold">${UI.escapeHtml(r.driver_name)}</td>
                    <td><span class="badge badge-outline">${UI.escapeHtml(r.class_name)}</span></td>
                    <td>${UI.escapeHtml(r.car)}</td>
                    <td><span class="badge ${r.payment_status === 'paid' ? 'badge-green' : 'badge-outline'}">${UI.escapeHtml(r.payment_status)}</span></td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>`;
      } catch (err) {
        container.innerHTML = '<p class="text-muted">Could not load registrations.</p>';
      }
    }

    initPage();
  </script>
</body>
</html>
