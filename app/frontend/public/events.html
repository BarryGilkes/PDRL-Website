<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events - PDRL</title>
  <link rel="icon" href="/images/Events.jpg">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <main style="flex:1" class="py-12">
    <div class="container">
      <div class="mb-8">
        <div style="display:inline-flex;align-items:center;gap:8px;background:var(--red-bg);border:1px solid var(--red-border);border-radius:9999px;padding:6px 16px;margin-bottom:1rem">
          <span class="text-sm" style="color:#fca5a5;font-weight:600">🏁 Events</span>
        </div>
        <h1 style="margin-bottom:0.5rem">PDRL Events</h1>
        <p class="text-lg text-secondary">View upcoming and past events. Click on an event to see race results.</p>
      </div>

      <!-- Filter -->
      <div class="card mb-6">
        <div class="card-body">
          <div class="flex gap-4 items-center flex-wrap">
            <label class="text-sm font-medium text-secondary">Filter by status:</label>
            <select id="status-filter" class="form-select" style="width:auto;min-width:160px" onchange="loadEvents()">
              <option value="">All Events</option>
              <option value="upcoming" selected>Upcoming</option>
              <option value="completed">Completed</option>
              <option value="cancelled">Cancelled</option>
            </select>
          </div>
        </div>
      </div>

      <div id="events-container">
        <div class="loading"><div class="spinner"></div><p class="mt-4">Loading events...</p></div>
      </div>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="/app.js"></script>
  <script>
    async function loadEvents() {
      const container = document.getElementById('events-container');
      const status = document.getElementById('status-filter').value;
      UI.showLoading(container);

      try {
        const params = { limit: 50 };
        if (status) params.status = status;
        const items = await PublicAPI.fetchEvents(params);

        if (items.length === 0) {
          container.innerHTML = '<div class="card"><div class="card-body text-center py-12"><p class="text-secondary text-lg">No events found.</p></div></div>';
          return;
        }

        let html = '<div class="grid grid-2">';
        for (const evt of items) {
          const statusBadge = evt.status === 'upcoming'
            ? '<span class="badge badge-green">Upcoming</span>'
            : evt.status === 'completed'
            ? '<span class="badge badge-gray">Completed</span>'
            : '<span class="badge badge-red">Cancelled</span>';

          // Load flyer async
          const flyerId = 'flyer-' + evt.id;

          html += `
            <div class="card event-card">
              <div class="card-header" style="display:flex;align-items:center;justify-content:space-between">
                ${statusBadge}
                <span class="text-sm text-secondary">${UI.formatDate(evt.date)}</span>
              </div>
              <div class="card-body">
                <h3 style="margin-bottom:4px">${UI.escapeHtml(evt.title)}</h3>
                <p class="text-sm text-secondary mb-4">${UI.escapeHtml(evt.location || 'Location TBA')} • ${UI.escapeHtml(evt.start_time || 'TBA')}</p>

                <div id="${flyerId}" class="mb-4 hidden">
                  <img src="" alt="Flyer" style="width:100%;max-height:180px;object-fit:contain;border-radius:var(--radius);border:1px solid var(--border);background:rgba(0,0,0,0.3)">
                </div>

                <div class="event-meta mb-4">
                  <div class="event-meta-item"><div class="meta-label">Buy-in</div><div class="meta-value">${UI.escapeHtml(evt.buyin || 'TBA')}</div></div>
                  <div class="event-meta-item"><div class="meta-label">Payout</div><div class="meta-value">${UI.escapeHtml(evt.payout || 'TBA')}</div></div>
                  <div class="event-meta-item"><div class="meta-label">Format</div><div class="meta-value">${UI.escapeHtml(evt.format || 'TBA')}</div></div>
                  <div class="event-meta-item"><div class="meta-label">Entry Fee</div><div class="meta-value">${UI.escapeHtml(evt.price || 'TBA')}</div></div>
                </div>

                ${evt.notes ? `<p class="text-sm text-muted mb-4">${UI.escapeHtml(evt.notes)}</p>` : ''}

                <div class="flex gap-3">
                  <a href="/event-results.html?eventId=${evt.id}" class="btn btn-outline btn-sm">View Results</a>
                  <a href="/register.html?eventId=${evt.id}" class="btn btn-primary btn-sm">Register</a>
                </div>
              </div>
            </div>`;

          // Load flyer in background
          if (evt.flyer_key) {
            loadFlyer(flyerId, evt.flyer_key);
          }
        }
        html += '</div>';
        container.innerHTML = html;

      } catch (e) {
        container.innerHTML = `<div class="alert alert-error">Error loading events: ${UI.escapeHtml(e.message)}</div>`;
      }
    }

    async function loadFlyer(elementId, flyerKey) {
      const url = await PublicAPI.fetchFlyerUrl(flyerKey);
      if (url) {
        // Small delay to ensure DOM is ready
        setTimeout(() => {
          const el = document.getElementById(elementId);
          if (el) {
            el.querySelector('img').src = url;
            el.classList.remove('hidden');
          }
        }, 100);
      }
    }

    loadEvents();
  </script>
</body>
</html>
